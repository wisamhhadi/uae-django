{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <!-- Main Confirmation Card -->
        <div class="card shadow-lg border-0">
            <!-- Header -->
            <div class="card-header bg-danger-subtle border-0 text-center py-4">
                <div class="d-flex justify-content-center align-items-center">
                    <i class="fas fa-exclamation-triangle text-danger fs-4 me-3"></i>
                    <h4 class="card-title mb-0 text-danger fw-bold">تأكيد الحذف</h4>
                </div>
            </div>

            <!-- Body -->
            <div class="card-body text-center px-4 py-5">
                <!-- Large Icon -->
                <div class="mb-4">
                    <i class="fas fa-trash-alt text-danger" style="font-size: 4rem;"></i>
                </div>

                <!-- Confirmation Message -->
                <h3 class="text-dark mb-4 fw-semibold">
                    هل أنت متأكد من حذف "{{ object }}"؟
                </h3>

                <!-- Warning Text -->
                <div class="alert alert-warning border-0 bg-warning-subtle mb-4">
                    <i class="fas fa-info-circle text-warning me-2"></i>
                    <span class="text-muted">
                        هذا الإجراء لا يمكن التراجع عنه. سيتم حذف جميع البيانات المرتبطة بهذا العنصر بشكل نهائي.
                    </span>
                </div>

                <!-- Action Buttons -->
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <!-- Cancel Button -->
                        <a onclick="history.back()" class="btn btn-outline-secondary btn-lg px-4 shadow-sm">
                            <i class="fas fa-times me-2"></i>
                            إلغاء
                        </a>
                        
                        <!-- Delete Button -->
                        <button type="submit" class="btn btn-danger btn-lg px-4 shadow-sm">
                            <i class="fas fa-check me-2"></i>
                            نعم، حذف
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Additional Safety Message -->
        <div class="text-center mt-4">
            <small class="text-muted">
                <i class="fas fa-shield-alt me-1"></i>
                تأكد من صحة قرارك قبل المتابعة
            </small>
        </div>
    </div>
</div>

{% endblock content %}
