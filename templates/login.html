{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>

    <!-- Bootstrap RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-text {
            background: linear-gradient(45deg, #34a430, #28a745);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-control:focus {
            border-color: #34a430;
            box-shadow: 0 0 0 0.2rem rgba(52, 164, 48, 0.25);
        }

        .btn-login {
            background: linear-gradient(45deg, #34a430, #28a745);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: linear-gradient(45deg, #28a745, #20c997);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 164, 48, 0.4);
        }

        .floating-icons {
            position: absolute;
            top: -10px;
            right: -10px;
            opacity: 0.1;
            font-size: 3rem;
            color: #34a430;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <!-- Background decorative elements -->
    <div class="position-fixed top-0 start-0 w-100 h-100" style="z-index: -1;">
        <i class="fas fa-truck position-absolute" style="top: 10%; left: 10%; font-size: 2rem; opacity: 0.1; color: white;"></i>
        <i class="fas fa-shipping-fast position-absolute" style="top: 20%; right: 15%; font-size: 1.5rem; opacity: 0.1; color: white;"></i>
        <i class="fas fa-route position-absolute" style="bottom: 20%; left: 20%; font-size: 2.5rem; opacity: 0.1; color: white;"></i>
        <i class="fas fa-map-marker-alt position-absolute" style="bottom: 10%; right: 10%; font-size: 2rem; opacity: 0.1; color: white;"></i>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
                <!-- Login Card -->
                <div class="card login-card shadow-lg border-0">
                    <div class="card-body p-5">
                        <!-- Logo Section -->
                        <div class="text-center mb-5">
                            <div class="position-relative d-inline-block">
                                <img src="{% static 'images/logo.png' %}" width="100px" height="100px" style="margin-bottom: 10px;">


{#                                <br>#}
{#                                <div class="floating-icons">#}
{#                                    <i class="fas fa-truck"></i>#}
{#                                </div>#}
                            </div>
                            <h5 class=" mb-0">
                                <i class="fas fa-route text-success me-2"></i>
                                شركة الامارات العربية
                            </h5>
                            <br>
                            <p>لمعدات الاطفاء والانذار المبكر والفحوصات الهندسية</p>
                        </div>

                        <!-- Login Form -->
                        <form action="{% url 'login' %}" method="post">
                            {% csrf_token %}

                            <!-- Phone Number Field -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold text-dark">
                                    <i class="fas fa-phone text-success me-2"></i>
                                    رقم الهاتف
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-mobile-alt text-muted"></i>
                                    </span>
                                    <input type="text"
                                           name="phone"
                                           class="form-control border-start-0 ps-0"
                                           placeholder="أدخل رقم الهاتف"
                                           required>
                                </div>
                            </div>

                            <!-- Password Field -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold text-dark">
                                    <i class="fas fa-lock text-success me-2"></i>
                                    كلمة المرور
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-key text-muted"></i>
                                    </span>
                                    <input type="password"
                                           name="password"
                                           class="form-control border-start-0 ps-0"
                                           placeholder="أدخل كلمة المرور"
                                           required>
                                </div>
                            </div>

                            <!-- Error Messages -->
                            {% if form.errors %}
                            <div class="alert alert-danger border-0 mb-4" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                رقم الهاتف أو كلمة المرور غير صحيحة
                            </div>
                            {% endif %}

                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-login text-white w-100 py-3 fw-semibold">
                                <i class="fas fa-sign-in-alt me-2"></i>
                                تسجيل الدخول
                            </button>
                        </form>

                        <!-- Additional Features -->
                        <div class="row mt-4">
                            <div class="col-12">
                                <div class="d-flex justify-content-center">
                                    <small class="text-muted">
                                        <i class="fas fa-shield-alt text-success me-1"></i>
                                        تسجيل دخول آمن ومشفر
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="text-center mt-4">
                    <small class="text-white-50">
                        <i class="fas fa-copyright me-1"></i>
                        شركة شحنكو للحلول البرمجية المتكاملة © 2025
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
